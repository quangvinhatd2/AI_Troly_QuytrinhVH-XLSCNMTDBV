<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập quản trị - HPCBANVE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: #f0f2f5;
      display: flex; align-items: center; justify-content: center; 
      min-height: 100vh; 
    }
    .card { 
      background: white; padding: 40px; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.08); width: 100%; max-width: 360px; 
    }
    h2 { color: #1a73e8; margin-bottom: 24px; text-align: center; font-weight: 600; }
    
    /* Hiển thị lỗi từ flash của Flask */
    .flash { 
      background: #fce8e6; color: #c5221f; padding: 12px;
      border-radius: 6px; margin-bottom: 20px; font-size: 14px;
      border-left: 4px solid #d93025;
    }
    
    label { display: block; font-size: 13px; color: #5f6368; margin-bottom: 8px; font-weight: 500; }
    
    input[type=password] { 
      width: 100%; padding: 12px 14px; border: 1px solid #dadce0;
      border-radius: 6px; font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    input[type=password]:focus { border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,0.1); }
    
    button { 
      width: 100%; margin-top: 25px; padding: 12px;
      background: #1a73e8; color: white; border: none;
      border-radius: 6px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #1558b0; }
    
    .back-home {
      display: block; text-align: center; margin-top: 20px;
      font-size: 13px; color: #70757a; text-decoration: none;
    }
    .back-home:hover { color: #1a73e8; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Admin Login</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
      <label for="pwd">Mật khẩu hệ thống</label>
      <input type="password" id="pwd" name="password" autofocus required 
             placeholder="Nhập mật khẩu quản trị...">
      
      <button type="submit">Xác nhận đăng nhập</button>
    </form>

    <a href="{{ url_for('home') }}" class="back-home">← Quay lại trang chủ</a>
  </div>
</body>
</html>
